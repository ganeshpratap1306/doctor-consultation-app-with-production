apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: doctor-consulting
spec:
  replicas: 8
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: nikki1306/backend-doctors:latest
          ports:
            - containerPort: 8000

---

apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: doctor-consulting
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      nodePort: 31100
