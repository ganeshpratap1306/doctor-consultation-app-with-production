version: "3.8"
services:

  backend:
    container_name: backend-doctors
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    

  frontend:
    container_name: doctor-consulting
    build: ./frontend
    env_file:
      - ./frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend   

networks:
  default:
    name: my-app-network

